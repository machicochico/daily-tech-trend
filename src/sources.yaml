sources:
  # tls_mode: strict(既定) / relaxed(証明書検証を緩和して運用する例外)
  # --- システム ---
  - id: aws-blog
    name: AWS Blog
    category: system
    url: https://aws.amazon.com/blogs/aws/feed/

  - id: gcp-blog
    name: Google Cloud Blog
    category: system
    # 旧 cloud.google.com/blog/rss は空応答化（2026-07 に移転確認）
    url: https://cloudblog.withgoogle.com/rss/

  # --- セキュリティ ---
  # CISA は非ブラウザ UA に 403 を返すため user_agent 指定が必須（2026-07 確認）
  - id: cisa-all
    name: CISA Cybersecurity Advisories
    category: security
    subcategory: security_ot
    user_agent: &browser_ua "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
    url: https://www.cisa.gov/cybersecurity-advisories/all.xml

  - id: jpcert
    name: JPCERT/CC
    category: security
    subcategory: security_ot
    url: https://www.jpcert.or.jp/rss/jpcert-all.rdf

  - id: cisa-ics-advisories
    name: CISA ICS Advisories
    category: security
    subcategory: security_ot
    user_agent: *browser_ua
    url: https://www.cisa.gov/cybersecurity-advisories/ics-advisories.xml

  - id: cisa-ics-medical-advisories
    name: CISA ICS Medical Advisories
    category: security
    subcategory: security_ot
    user_agent: *browser_ua
    url: https://www.cisa.gov/cybersecurity-advisories/ics-medical-advisories.xml

  # 廃止済み CISA フィード（2026-07 確認・削除）:
  #   ics-recommended-practices.xml / sbom.xml / known-exploited-vulnerabilities-catalog.xml
  #   → いずれも 404。KEV 追加は cisa-all (all.xml) に流れる。
  #   KEV カタログ全量が必要なら公式 JSON API:
  #   https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json

  # --- 標準化・規格 ---
  # ISO はニュースを /insights に統合し RSS 廃止（2026-07 確認）
  # IEC は Imperva ボット保護でフィード取得不可・公式購読はメールのみ（2026-07 確認）

  - id: nist-news
    name: NIST News
    category: standards
    url: https://www.nist.gov/news-events/news/rss.xml

  # ENISA は新サイト移行で RSS を全廃（公式告知あり・2026-07 確認）。
  # 新しい購読メカニズムが公開されたら再追加する。

  # JISC は RSS 廃止（2026-07 確認・新着ページに購読導線なし）

  # --- 市況（コモディティ・港湾/海運・スクラップ指数） ---
  - id: oilprice-commodities
    name: OilPrice.com (Commodities)
    category: market
    url: https://oilprice.com/rss/main

  - id: hellenic-shipping
    name: Hellenic Shipping News
    category: market
    url: https://www.hellenicshippingnews.com/feed/

  # Recycling Today は新プラットフォーム移行で RSS 廃止（2026-07 確認）

  # --- AI ---
  - id: openai-news
    name: OpenAI News
    category: ai
    vendor: OpenAI
    weekly_new_limit: 5
    url: https://openai.com/news/rss.xml

  - id: google-ai-blog
    name: Google Research Blog
    category: ai
    vendor: Google
    weekly_new_limit: 8
    # 旧 ai.googleblog.com は research.google/blog に統合（2026-07 確認）
    url: https://research.google/blog/rss/

  - id: deepmind-blog
    name: Google DeepMind Blog
    category: ai
    vendor: Google
    weekly_new_limit: 8
    url: https://deepmind.google/blog/rss.xml

  - id: meta-ai
    name: Meta AI Research (Engineering at Meta)
    category: ai
    vendor: Meta
    weekly_new_limit: 5
    # ai.meta.com/blog は公式RSSなし。Engineering at Meta の AI Research カテゴリで代替（2026-07 確認）
    url: https://engineering.fb.com/category/ai-research/feed/

  - id: microsoft-ai
    name: Microsoft AI Blog
    category: ai
    vendor: Microsoft
    weekly_new_limit: 5
    url: https://blogs.microsoft.com/ai/feed/

  - id: aws-ml
    name: AWS Machine Learning Blog
    category: ai
    vendor: AWS
    weekly_new_limit: 6
    url: https://aws.amazon.com/blogs/machine-learning/feed/

  - id: huggingface-blog
    name: Hugging Face Blog
    category: ai
    vendor: Hugging Face
    weekly_new_limit: 5
    url: https://huggingface.co/blog/feed.xml

  - id: arxiv-ai
    name: arXiv AI (cs.AI)
    category: ai
    vendor: arXiv
    weekly_new_limit: 20
    url: http://export.arxiv.org/rss/cs.AI

  - id: arxiv-ml
    name: arXiv Machine Learning (cs.LG)
    category: ai
    vendor: arXiv
    weekly_new_limit: 20
    url: http://export.arxiv.org/rss/cs.LG

  - id: github-ml
    name: GitHub Machine Learning
    category: ai
    vendor: GitHub
    weekly_new_limit: 6
    # カテゴリ URL 再編（2026-07 確認）
    url: https://github.blog/ai-and-ml/machine-learning/feed/

  # --- 製造（鉄鋼） ---
  # 鉄鋼団体・企業ニュース（鉄鋼主軸に寄せる）
  - id: worldsteel
    name: worldsteel (World Steel Association)
    category: manufacturing
    url: https://worldsteel.org/feed/

  - id: jfe-holdings
    name: JFEホールディングス
    category: manufacturing
    url: https://www.jfe-holdings.co.jp/rss/release.xml

  - id: nippon-steel
    name: 日本製鉄
    category: manufacturing
    # newsroom 配下へ移転（2026-07 確認）
    url: https://www.nipponsteel.com/newsroom/news/rss.xml

  # 神戸製鋼所は RSS 提供を終了（2026-07 確認、代替はメール配信のみ）

  - id: posco-holdings
    name: POSCO Group Newsroom
    category: manufacturing
    # 旧 posco-inc.com:4451（証明書問題で relaxed 運用）から公式 Newsroom へ移転（2026-07 確認）
    url: https://newsroom.posco.com/en/feed/

  # ArcelorMittal は新サイトで RSS 提供なし（2026-07 確認）

  - id: nucor
    name: Nucor (IR Press Releases)
    category: manufacturing
    # 本体サイトの RSS は廃止。IR プレスリリース RSS で代替（2026-07 確認）
    url: https://investors.nucor.com/rss/pressrelease.aspx

  # U.S. Steel は日本製鉄傘下で IR サイトごと消滅・RSS なし（2026-07 確認）

  - id: tata-steel
    name: Tata Steel Nederland
    category: manufacturing
    # 本体サイトは WAF で RSS 取得不可。欧州部門の Presspage フィードで代替（2026-07 確認）
    url: https://www.tatasteelnederland.com/nieuws/tagfeed/en/tags/news,statements

  - id: steel-on-the-net
    name: SteelOnTheNet (鉄鋼業界ニュース)
    category: manufacturing
    weekly_new_limit: 5
    # Steel Times International のフィード廃止に伴う業界ニュースの代替（2026-07 追加）
    url: https://www.steelonthenet.com/news/newsfeed.xml

  - id: thyssenkrupp-steel
    name: thyssenkrupp Group
    category: manufacturing
    # Steel 専用 RSS は消滅。グループ全体のプレスリリース RSS で代替（Steel のニュースも含む・2026-07 確認）
    url: https://www.thyssenkrupp.com/en/rss-feed/rss-newsfeed

  - id: sms-group
    name: SMS group (PresseBox)
    category: manufacturing
    # 自社サイトの RSS は廃止。公式配信先 PresseBox の RSS で代替（2026-07 確認）
    url: https://www.pressebox.com/rss/press-releases/newsroom/sms-siemag-ag

  # 既存（製造/OT・ICSも残す）
  - id: mhi
    name: 三菱重工業
    category: manufacturing
    url: https://www.mhi.com/rss/mhi_news.xml

  - id: siemens-cert
    name: Siemens ProductCERT
    category: manufacturing
    # cert-portal.siemens.com へ移転（2026-07 確認）
    url: https://cert-portal.siemens.com/productcert/rss/advisories.atom

  # MES / SCADA / IIoT 専門媒体・主要ベンダ技術アラート
  # kind は tech のまま、category は manufacturing に統一し
  # 運用上は name の接頭辞でサブカテゴリを識別する
  - id: iiot-world
    name: "[IIoT] IIoT World"
    category: manufacturing
    kind: tech
    region: global
    url: https://www.iiot-world.com/feed/

  - id: inductive-automation-blog
    name: Inductive Automation
    category: manufacturing
    kind: tech
    region: global
    url: https://inductiveautomation.com/blog/rss.xml

  # AVEVA はブログ RSS 廃止（2026-07 確認。Medium の @AVEVA はあるが未検証のため見送り）

  - id: rockwell-blog
    name: Rockwell Automation (Press Releases)
    category: manufacturing
    kind: tech
    region: global
    # ブログ用フィードは廃止。公式 IR ページが案内するプレスリリース RSS で代替（2026-07 確認）
    url: https://rockwell2023tf.q4web.com/rss/pressrelease.aspx

  # --- スマートファクトリー（設備OEM / 産業SIer / クラウド導入事例） ---
  - id: siemens-case-studies
    name: "[設備OEM] Siemens Customer Services"
