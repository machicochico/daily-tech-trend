  - id: schneider-smart-factory
    name: "[設備OEM] Schneider Electric"
    category: smart_factory
    kind: tech
    region: global
    url: https://blog.se.com/feed/

  # NTT DATA は RSS 廃止（2026-07 確認・BusinessWire 配信のみ）

  - id: aws-manufacturing-blog
    name: "[クラウド] AWS Industries - Manufacturing"
    category: smart_factory
    kind: tech
    region: global
    # カテゴリパスが category/industries/manufacturing に変更（2026-07 確認）
    url: https://aws.amazon.com/blogs/industries/category/industries/manufacturing/feed/

  - id: azure-industrial-iot
    name: "[クラウド] Microsoft Azure IoT Blog"
    category: smart_factory
    kind: tech
    region: global
    # topics/ → category/ に再編（2026-07 確認）。デフォルト UA だとタイムアウトするためブラウザ UA 必須
    user_agent: *browser_ua
    url: https://azure.microsoft.com/en-us/blog/category/internet-of-things/feed/

  - id: automation-world
    name: Automation World
    category: smart_factory
    weekly_new_limit: 5
    # 新プラットフォームの公式フィード（?input= は URLエンコード済み JSON。2026-07 確認）
    url: "https://www.automationworld.com/__rss/website-scheduled-content.xml?input=%7B%22sectionAlias%22%3A%22home%22%7D"

  - id: control-global
    name: Control Global
    category: smart_factory
    weekly_new_limit: 5
    url: "https://www.controlglobal.com/__rss/website-scheduled-content.xml?input=%7B%22sectionAlias%22%3A%22home%22%7D"

