
categories:
  - id: system
    name: システム
  - id: manufacturing
    name: 製造（鉄鋼）
  - id: quality
    name: 品質
  - id: maintenance
    name: 保全
  - id: smart_factory
    name: スマートファクトリー（導入事例）
  - id: policy
    name: 政策・規制（脱炭素）
  - id: decarbonization_ops
    name: 脱炭素オペレーション（算定・LCA）
  - id: security
    name: セキュリティ
  - id: standards
